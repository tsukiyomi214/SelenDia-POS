<meta name="viewport" content="width=device-width, initial-scale=1">

<h2>POSレジ</h2>

<input id="seller" placeholder="販売者名">
<input id="search" placeholder="商品検索">

<div class="container">
  <div class="left">
    <h3>商品一覧</h3>
    <div id="list"></div>
  </div>

  <div class="right">
    <h3>カート</h3>
    <div id="cart"></div>
    <button onclick="checkout()">🧾 会計</button>
  </div>
</div>

<hr>

<h3>商品追加</h3>
<input id="newName" placeholder="商品名">
<input id="newPrice" placeholder="価格">
<input id="newStock" placeholder="在庫">
<button onclick="addProduct()">追加</button>

<div id="adminArea" style="display:none;">
  <hr>
  <h3>📊 売上</h3>
  <button onclick="getSales()">更新</button>
  <div id="sales"></div>

  <hr>
  <h3>🏆 店員ランキング</h3>
  <button onclick="getRanking()">更新</button>
  <div id="ranking"></div>
</div>

<button onclick="logout()">ログアウト</button>

<script>
const STAFF_PASS = "8065";
const ADMIN_PASS = "0214";

let role = sessionStorage.getItem("role");

if(!role){
  let input = prompt("パスワード");
  if(input === ADMIN_PASS) role="admin";
  else if(input === STAFF_PASS) role="staff";
  else { alert("拒否"); document.body.innerHTML=""; throw "error"; }
  sessionStorage.setItem("role", role);
}

const API = "ここにGASのURL";

let cart = [];

window.onload = ()=>{
  search();
  if(role==="admin"){
    document.getElementById("adminArea").style.display="block";
  }
};

async function search(){
  const keyword = document.getElementById("search").value;

  const res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({type:"search",keyword})
  });

  const data = await res.json();

  let html="";
  data.forEach(p=>{
    html += `<div onclick="addCart('${p[0]}','${p[1]}',${p[2]})">
      ${p[1]} - ${p[2]}円（在庫:${p[3]}）
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
}

function addCart(id,name,price){
  const f = cart.find(c=>c.id===id);
  if(f) f.qty++;
  else cart.push({id,name,price:Number(price),qty:1});
  renderCart();
}

function renderCart(){
  let html="",total=0;

  cart.forEach((c,i)=>{
    total+=c.price*c.qty;
    html+=`${c.name}×${c.qty}
    <button onclick="inc(${i})">+</button>
    <button onclick="dec(${i})">-</button><br>`;
  });

  html+=`合計:${total}円`;
  document.getElementById("cart").innerHTML=html;
}

function inc(i){cart[i].qty++;renderCart();}
function dec(i){cart[i].qty--;if(cart[i].qty<=0)cart.splice(i,1);renderCart();}

async function checkout(){
  const seller=document.getElementById("seller").value;

  for(const item of cart){
    await fetch(API,{
      method:"POST",
      body:JSON.stringify({
        type:"sell",
        id:item.id,
        qty:item.qty,
        seller
      })
    });
  }

  alert("完了");
  cart=[];
  renderCart();
  search();
}

async function addProduct(){
  const name=newName.value;
  const price=newPrice.value;
  const stock=newStock.value;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({type:"add",name,price,stock})
  });

  alert("追加完了");
  search();
}

async function getSales(){
  const res=await fetch(API,{
    method:"POST",
    body:JSON.stringify({type:"sales"})
  });
  const data=await res.json();
  sales.innerHTML=`売上:${data.total}円（${data.count}件）`;
}

async function getRanking(){
  const res=await fetch(API,{
    method:"POST",
    body:JSON.stringify({type:"ranking"})
  });
  const data=await res.json();

  let html="";
  data.forEach((r,i)=>{
    html+=`${i+1}位:${r.name} ${r.total}円<br>`;
  });

  ranking.innerHTML=html;
}

function logout(){
  sessionStorage.clear();
  location.reload();
}
</script>
